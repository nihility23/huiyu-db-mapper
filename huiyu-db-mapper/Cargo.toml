[package]
name = "huiyu-db-mapper"
version = "0.1.0"
edition = "2024"

[dependencies]
huiyu-db-mapper-core={path = "../huiyu-db-mapper-core"}
huiyu-db-mapper-postgres={path = "../huiyu-db-mapper-postgres",optional = true}
huiyu-db-mapper-sqlite={path = "../huiyu-db-mapper-sqlite", optional = true}
huiyu-db-mapper-mysql={path = "../huiyu-db-mapper-mysql", optional = true}

chrono = { workspace = true }
rustlog = {workspace = true}
thiserror = {workspace = true}
tokio = {workspace = true}
uuid = {workspace = true}
lazy_static = {workspace = true}
deadpool = { workspace = true }
deadpool-sync = {workspace = true}
dashmap = {workspace = true }

[features]
default = ["sqlite"]
postgres = ["huiyu-db-mapper-postgres"]
sqlite = ["huiyu-db-mapper-sqlite"]
mysql = ["huiyu-db-mapper-mysql"]
